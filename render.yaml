services:
  - type: web
    name: def-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false
      - key: STORAGE_DIR
        value: /var/data
    disk:
      name: def-storage
      mountPath: /var/data
      sizeGB: 1